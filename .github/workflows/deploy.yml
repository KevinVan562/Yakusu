name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
    paths:
      - ".gitattributes"
      - ".github/workflows/deploy.yml"
      - "services/api/**"
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          # Configure Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Initialize LFS
          git lfs install

          # Build the Hugging Face Space payload from the API service only.
          rm -rf /tmp/yakusu-hf-space
          mkdir -p /tmp/yakusu-hf-space
          cp -R services/api/. /tmp/yakusu-hf-space/
          cp .gitattributes /tmp/yakusu-hf-space/.gitattributes

          # Commit the payload on a clean branch with no repository history.
          git checkout --orphan deploy-branch
          git rm --cached -r .
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R /tmp/yakusu-hf-space/. .
          git add .gitattributes .gitignore Dockerfile README.md app requirements.txt
          git add -f models/manga-bubble-yolov8.pt
          git commit -m "Deploy current state"

          # Push only this clean commit to Hugging Face
          git push --force https://Kevan562:$HF_TOKEN@huggingface.co/spaces/Kevan562/yakusu-api deploy-branch:main
