name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Initialize LFS
          git lfs install
          
          # We create a clean "deployment" branch with NO history.
          # This avoids Hugging Face seeing the "regular file" in previous commits.
          git checkout --orphan deploy-branch
          git rm --cached -r .
          git add .gitattributes .gitignore Dockerfile README.md app requirements.txt
          git add -f models/manga-bubble-yolov8.pt
          git commit -m "Deploy current state"
          
          # Push only this clean commit to Hugging Face
          git push --force https://Kevan562:$HF_TOKEN@huggingface.co/spaces/Kevan562/yakusu-api deploy-branch:main
